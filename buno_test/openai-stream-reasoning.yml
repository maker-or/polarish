info:
  name: openai-stream-reasoning
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:3000/api/v1/chat/completions
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{process.env.OPENAI_API_KEY}}
  body:
    type: json
    data: |-
      {
        "provider": "openai-codex",
        "model": "{{OPENAI_MODEL}}",
        "system": "You are a careful reasoner. Show your reasoning briefly, then give the final answer.",
        "stream": true,
        "temperature": 0.3,
        "maxRetries": 2,
        "messages": [
          {
            "role": "user",
            "content": "A train travels 120 km in 90 minutes. What is its average speed in km/h? Think step by step.",
            "timestamp": 1
          }
        ]
      }
  auth: inherit

runtime:
  variables:
    - name: OPENAI_MODEL
      value: gpt-5.4
  scripts:
    - type: tests
      code: |-
        function responseText() {
          const raw = res.getBody();
          if (typeof raw === "string") return raw;
          if (raw && typeof raw === "object") return JSON.stringify(raw);
          return String(raw ?? "");
        }

        function contentType() {
          const h = res.headers || {};
          return String(
            h["content-type"] || h["Content-Type"] || h["CONTENT_TYPE"] || ""
          ).toLowerCase();
        }

        test("should return 200", function () {
          expect(res.status).to.equal(200);
        });

        test("should stream as text/event-stream", function () {
          expect(contentType()).to.include("text/event-stream");
        });

        test("should include SSE data lines", function () {
          const text = responseText();
          expect(text).to.include("data:");
        });

        test("should receive a non-trivial streamed payload", function () {
          expect(responseText().length).to.be.at.least(80);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
